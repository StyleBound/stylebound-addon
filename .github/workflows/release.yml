name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and upload
        uses: BigWigsMods/packager@v2
        with:
          # Default CurseForge *file list name* is only {project-version}; untagged builds use the
          # short git hash (e.g. 91d693c). Prefix with {package-name} so uploads stay readable.
          args: '-n ":{package-name}-{project-version}{beta}{nolib}{classic}"'
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          RELEASE_TYPE: beta
